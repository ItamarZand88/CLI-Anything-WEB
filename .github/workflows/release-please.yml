name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.rp.outputs.pr }}
      pr_branch: ${{ steps.rp.outputs.prs_created == 'true' && 'release-please--branches--main' || '' }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        # Manifest mode: packages, changelog sections, and extra-files live
        # in release-please-config.json / .release-please-manifest.json.
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Run tests on the release-please PR branch so required checks pass.
  # Only runs when a release PR branch actually exists — avoids checkout
  # failures caused by checking out a deleted branch after a release merges.
  run-tests:
    needs: release-please
    if: needs.release-please.outputs.pr_branch != ''
    uses: ./.github/workflows/tests.yml
    with:
      ref: ${{ needs.release-please.outputs.pr_branch }}
