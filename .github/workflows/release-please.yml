name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.rp.outputs.pr }}
      pr_branch: ${{ steps.rp.outputs.prs_created == 'true' && 'release-please--branches--main' || '' }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          changelog-types: |
            [
              {"type": "feat", "section": "Features", "hidden": false},
              {"type": "fix", "section": "Bug Fixes", "hidden": false},
              {"type": "chore", "section": "Miscellaneous", "hidden": true},
              {"type": "docs", "section": "Documentation", "hidden": false},
              {"type": "perf", "section": "Performance", "hidden": false},
              {"type": "refactor", "section": "Code Refactoring", "hidden": true}
            ]

  # Run tests on the release-please PR branch so required checks pass.
  # Only runs when a release PR branch actually exists — avoids checkout
  # failures caused by checking out a deleted branch after a release merges.
  run-tests:
    needs: release-please
    if: needs.release-please.outputs.pr_branch != ''
    uses: ./.github/workflows/tests.yml
    with:
      ref: ${{ needs.release-please.outputs.pr_branch }}
