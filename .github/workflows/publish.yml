name: Publish to PyPI

# Publishes a monorepo package to PyPI. Two triggers:
#   * release: published     — automatic (requires release-please to run under a
#                              PAT/App token; the default GITHUB_TOKEN does NOT
#                              trigger this — see docs/PUBLISHING.md).
#   * workflow_dispatch      — manual, given a release tag. Used for the first
#                              release wave and for recovery/re-publishing.
#
# The package directory is resolved generically from release-please-config.json
# (component -> path). Auth: the account-scoped PYPI_API_TOKEN secret.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. cli-web-futbin-v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'cli-web-') ||
      startsWith(github.event.release.tag_name, 'cli-anything-web-meta-')
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Determine release tag
        id: tag
        run: echo "tag=${{ github.event.release.tag_name || github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve package directory from release-please config
        id: pkg
        run: |
          COMPONENT="${{ steps.tag.outputs.tag }}"
          COMPONENT="${COMPONENT%-v*}"   # cli-web-futbin-v0.1.0 -> cli-web-futbin
          DIR=$(jq -r --arg c "$COMPONENT" \
            '.packages | to_entries[] | select(.value.component == $c) | .key' \
            release-please-config.json)
          if [ -z "$DIR" ]; then
            echo "::error::No package with component '$COMPONENT' in release-please-config.json"
            exit 1
          fi
          echo "Resolved ${{ steps.tag.outputs.tag }} -> $DIR"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Build distribution
        run: |
          pip install build
          python -m build "${{ steps.pkg.outputs.dir }}" --outdir dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
